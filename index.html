<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive Me Chimuuuuu вЭ§пЄП</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    text-align:center;
}

h1{
    color:white;
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.3);
}

p{
    color:white;
    font-size:1.3rem;
    margin-bottom:30px;
    max-width:700px;
    padding:0 20px;
}

.buttons{
    display:flex;
    gap:20px;
}

button{
    padding:15px 35px;
    font-size:1.2rem;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4d6d;
    color:white;
}

#noBtn{
    background:white;
    color:#ff4d6d;
    position:relative;
}

.heart{
    position:absolute;
    color:red;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:1;
    }
    100%{
        transform:translateY(-100vh) scale(1.5);
        opacity:0;
    }
}

#loveMessage{
    display:none;
    margin-top:30px;
    color:white;
    font-size:2rem;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>рЯТЦ Forgive Me Chimuuuuu рЯТЦ</h1>

<p>
Cutieeee, Babyyyyyy, Jaanuuuuu вЭ§пЄП<br><br>
I know I made a mistake and I'm really sorry.
You mean the world to me and I never want to hurt you.
Will you forgive me? рЯ•Ї
</p>

<div class="buttons">
    <button id="yesBtn">Yes вЭ§пЄП</button>
    <button id="noBtn">No рЯШТ</button>
</div>

<div id="loveMessage">
    YAYYYYYY вЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄП<br>
    I Love You So Much Chimuuuuu рЯШШрЯТХ
</div>

<script>

let noBtn = document.getElementById("noBtn");
let yesBtn = document.getElementById("yesBtn");
let loveMessage = document.getElementById("loveMessage");

let size = 1;

noBtn.addEventListener("mouseover", () => {

    let x = Math.random() * (window.innerWidth - 150);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    size += 0.2;
    yesBtn.style.transform = `scale(${size})`;
});

yesBtn.addEventListener("click", () => {

    document.querySelector(".buttons").style.display = "none";

    loveMessage.style.display = "block";

    for(let i=0;i<100;i++){
        createHeart();
    }
});

function createHeart(){
    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "вЭ§пЄП";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random()*30+20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
